name: Build Static Libraries

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag (e.g. v1.0.0) — leave empty to build without publishing'
        required: false
        type: string
  pull_request:
  push:
    branches: [master]
    tags: ['v*']

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: linux-amd64
            triplet: x64-linux-generic
          - target: linux-arm64
            triplet: arm64-linux
          - target: mingw
            triplet: x64-mingw-static

    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build base image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/base.Dockerfile
          tags: recoil-libs-base:latest
          load: true
          cache-from: type=gha,scope=base
          cache-to: type=gha,mode=max,scope=base

      - name: Build ${{ matrix.target }} image
        run: |
          docker build \
            --build-arg BASE_IMAGE=recoil-libs-base:latest \
            -t recoil-libs-${{ matrix.target }}:latest \
            -f docker/${{ matrix.target }}.Dockerfile \
            .

      - name: Cache vcpkg binary packages
        uses: actions/cache@v5
        with:
          path: vcpkg-binary-cache
          key: vcpkg-${{ matrix.triplet }}-${{ hashFiles('vcpkg/vcpkg.json', 'vcpkg/ports/**') }}
          restore-keys: vcpkg-${{ matrix.triplet }}-

      - name: Build libraries
        run: |
          mkdir -p output vcpkg-binary-cache
          docker run --rm \
            -v "$(pwd)/vcpkg-binary-cache:/cache/vcpkg-binary-cache" \
            -v "$(pwd)/output:/build/recoil-libs/output" \
            recoil-libs-${{ matrix.target }}:latest

      - name: Package output
        run: |
          tar -czf recoil-libs-${{ matrix.triplet }}.tar.gz \
            -C output/installed/${{ matrix.triplet }} .

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: recoil-libs-${{ matrix.triplet }}
          path: recoil-libs-${{ matrix.triplet }}.tar.gz
          retention-days: 7

  release:
    name: Publish Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.release_tag != '')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag || github.ref_name }}
          name: ${{ inputs.release_tag || github.ref_name }}
          files: recoil-libs-*.tar.gz
          fail_on_unmatched_files: true
